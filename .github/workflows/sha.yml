name: Get SHA1

on:
  workflow_dispatch:

jobs:
  sha:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run signingReport
        run: ./gradlew signingReport
